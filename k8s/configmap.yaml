apiVersion: v1
kind: ConfigMap
metadata:
  name: clawdb-config
  namespace: clawdb
  labels:
    app.kubernetes.io/name: clawdb
data:
  CLAW_DATA_DIR: "/var/lib/clawdb"
  CLAW_LOG_LEVEL: "info"
  CLAW_LOG_FORMAT: "json"
  CLAW_GRPC_PORT: "50050"
  CLAW_HTTP_PORT: "8080"
  CLAW_METRICS_PORT: "9090"
  CLAW_VECTOR_ENABLED: "false"
  # Optional runtime integrations
  # CLAW_SYNC_HUB_URL: "https://sync.example.internal"
  # CLAW_REFLECT_BASE_URL: "https://reflect.example.internal"
