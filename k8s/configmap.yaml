apiVersion: v1
kind: ConfigMap
metadata:
  name: clawdb-config
  namespace: default
  labels:
    app: clawdb
data:
  # Logging configuration
  CLAW_LOG_LEVEL: "info"
  CLAW_LOG_FORMAT: "json"
  
  # Data directory (should be on a persistent volume in production)
  CLAW_DATA_DIR: "/data/clawdb"
  
  # gRPC server configuration
  CLAW_GRPC_PORT: "50050"
  
  # HTTP server configuration
  CLAW_HTTP_PORT: "8080"
  
  # Metrics/telemetry configuration
  CLAW_METRICS_PORT: "9090"
  
  # Integration service URLs
  VECTOR_SERVICE_URL: "http://vector-service:8081"
  REFLECT_SERVICE_URL: "http://reflect-service:8082"
  SYNC_HUB_URL: "http://sync-hub:8083"
  
  # Feature flags
  PLUGINS_ENABLED: "true"
  PLUGINS_SANDBOX_ENABLED: "true"
  
  # Database configuration
  CORE_SQLITE_PATH: "/data/clawdb/core.db"
  VECTOR_INDEX_PATH: "/data/clawdb/vector.idx"
  
  # Advanced configuration (optional)
  TRANSACTION_LOG_SIZE: "8192"
  SESSION_TTL_SECS: "3600"
  CACHE_SIZE_MB: "256"
