apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clawdb-server
  namespace: clawdb
  labels:
    app.kubernetes.io/name: clawdb
    app.kubernetes.io/component: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clawdb-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
