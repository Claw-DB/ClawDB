apiVersion: v1
kind: Service
metadata:
  name: clawdb-server
  namespace: clawdb
  labels:
    app.kubernetes.io/name: clawdb
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clawdb
    app.kubernetes.io/component: server
  ports:
    - name: grpc
      protocol: TCP
      port: 50050
      targetPort: grpc
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: metrics
