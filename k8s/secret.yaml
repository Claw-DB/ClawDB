apiVersion: v1
kind: Secret
metadata:
  name: clawdb-secrets
  namespace: default
  labels:
    app: clawdb
type: Opaque
stringData:
  # JWT secret for claw-guard - MUST be changed in production
  # Generate with: openssl rand -base64 32
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION_GENERATE_WITH_OPENSSL_RAND"
  
  # API key for LLM integration (if using external embedding service)
  # Example: OpenAI API key, Anthropic API key, etc.
  EMBEDDING_API_KEY: "CHANGE_ME_IF_USING_EXTERNAL_SERVICE"
  
  # Hub synchronization credentials (if syncing to a central hub)
  SYNC_HUB_TOKEN: "CHANGE_ME_IF_USING_SYNC_HUB"
  
  # TLS certificates and keys (if using mTLS or TLS)
  # These can be created from files:
  # kubectl create secret tls clawdb-tls --cert=tls.crt --key=tls.key -n default
  
  # Database credentials (if using external database)
  # DB_USER: "clawdb"
  # DB_PASSWORD: "CHANGE_ME_IF_USING_EXTERNAL_DB"
  # DB_HOST: "postgres.default.svc.cluster.local"
  # DB_PORT: "5432"
  
  # Additional credentials can be added as needed
  
---
# Example: If using TLS certificates, create them like this:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: clawdb-tls
#   namespace: default
# type: kubernetes.io/tls
# data:
#   tls.crt: LS0tLS1CRUdJTi...  # base64 encoded certificate
#   tls.key: LS0tLS1CRUdJTi...  # base64 encoded key

---
# Example: Environment secrets can be injected via sealed-secrets:
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: clawdb-secrets
#   namespace: default
# spec:
#   encryptedData:
#     JWT_SECRET: AgBvC7kZ8...
#   template:
#     metadata:
#       name: clawdb-secrets
#       namespace: default
#     type: Opaque
