apiVersion: v1
kind: ServiceAccount
metadata:
  name: clawdb-server
  namespace: clawdb
  labels:
    app.kubernetes.io/name: clawdb
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clawdb-server
  namespace: clawdb
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clawdb-server
  namespace: clawdb
subjects:
  - kind: ServiceAccount
    name: clawdb-server
    namespace: clawdb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clawdb-server
