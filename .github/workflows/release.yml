name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cross --locked
      - run: cross build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.target }}
          path: target/${{ matrix.target }}/release

  docker-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/clawdb/clawdb:${{ github.ref_name }}
            ghcr.io/clawdb/clawdb:latest

  publish-crate:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p claw-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
      - run: cargo publish -p claw-vector --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
      - run: cargo publish -p claw-sync --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
      - run: cargo publish -p claw-branch --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
      - run: cargo publish -p claw-guard --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
      - run: cargo publish -p clawdb --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true

  create-release:
    runs-on: ubuntu-latest
    needs: [build-binaries, docker-push]
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/**/release/*
            checksums.txt
