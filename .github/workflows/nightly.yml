name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --workspace
      - name: Publish bench artifacts
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/criterion

  dependency-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo update
      - name: Open PR with updates
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/nightly-dependency-updates
          title: "chore: nightly dependency updates"
          commit-message: "chore: cargo update"
          body: "Automated nightly dependency refresh."
